<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEA Strategy 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"DM Sans","Segoe UI",sans-serif;background:#0F2137}
#root{min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
</head>
<body>
<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0F2137;color:#C87941;font-family:Georgia,serif;font-size:20px;flex-direction:column;gap:16px"><div>TEA 2026</div><div style="font-size:12px;color:rgba(255,255,255,0.3);font-family:sans-serif">Dashboard wird geladen...</div></div></div>
<script>window.onerror=function(m){document.getElementById("root").innerHTML="<div style=\"padding:40px;color:#EF4444;font-family:sans-serif;background:#0F2137;min-height:100vh\"><h2 style=\"color:#C87941\">Fehler</h2><pre style=\"margin-top:16px;color:#EF4444;font-size:12px;white-space:pre-wrap\">"+m+"</pre></div>"}</script>
<script type="text/babel">

// ═══════════════════════════════════════
// RECHARTS CSS SHIM — lightweight chart replacements
// ═══════════════════════════════════════
const ResponsiveContainer = ({ children, width, height }) => (
  <div style={{ width: width || "100%", height: height || 200, position: "relative" }}>{children}</div>
);

// CSS absolute-positioned Bar Chart (no SVG, no flex %, no distortion)
const BarChart = ({ data, children }) => {
  const bars = React.Children.toArray(children).filter(c => c && c.type === Bar);
  const allVals = data.flatMap(d => bars.map(b => Math.abs(d[b.props.dataKey] || 0)));
  const rawMax = Math.max(...allVals);
  const niceMax = Math.ceil(rawMax / 50) * 50 || rawMax || 100;
  const yTicks = [0, Math.round(niceMax * 0.25), Math.round(niceMax * 0.5), Math.round(niceMax * 0.75), niceMax];
  const n = data.length;
  const groupW = 100 / n;
  const barW = groupW * 0.6 / Math.max(bars.length, 1);
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      <div style={{ flex: 1, display: "flex", minHeight: 0 }}>
        <div style={{ width: 36, display: "flex", flexDirection: "column-reverse", justifyContent: "space-between", paddingBottom: 2, paddingRight: 4 }}>
          {yTicks.map((v, i) => <span key={i} style={{ fontSize: 8, color: "#94A3B8", textAlign: "right", lineHeight: 1 }}>{v}</span>)}
        </div>
        <div style={{ flex: 1, borderLeft: "1px solid #E2E8F0", borderBottom: "1px solid #E2E8F0", position: "relative", overflow: "hidden" }}>
          {[0.25, 0.5, 0.75].map(f => <div key={f} style={{ position: "absolute", left: 0, right: 0, bottom: (f*100)+"%", borderTop: "1px dashed #F1F5F9" }} />)}
          {data.map((d, di) =>
            bars.map((b, bi) => {
              const v = d[b.props.dataKey] || 0;
              const clr = b.props.fill || "#3B82F6";
              const cells = React.Children.toArray(b.props.children||[]).filter(c=>c&&c.type===Cell);
              const col = cells[di] ? cells[di].props.fill : clr;
              const pct = niceMax > 0 ? (Math.abs(v)/niceMax)*100 : 0;
              const left = di*groupW + groupW*0.2 + bi*barW;
              return <div key={di+"-"+bi} style={{ position: "absolute", bottom: 0, left: left+"%", width: barW+"%", height: pct+"%", background: col, opacity: b.props.opacity||0.85, borderRadius: "3px 3px 0 0", transition: "height 0.4s ease" }} />;
            })
          )}
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-around", marginLeft: 36, padding: "4px 0" }}>
        {data.map((d, i) => <span key={i} style={{ fontSize: 7, color: "#94A3B8", whiteSpace: "nowrap" }}>{d[Object.keys(d)[0]]}</span>)}
      </div>
      {bars.length > 1 && <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        {bars.map((b,i) => <span key={i} style={{fontSize:9,color:b.props.fill||"#3B82F6"}}>{"\u25A0"} {b.props.name||b.props.dataKey}</span>)}
      </div>}
    </div>
  );
};

const Bar = ({ dataKey, fill, name, radius, opacity, children }) => null;
const Cell = ({ fill }) => null;

// Pixel-accurate SVG line overlay (measures container via ref)
const SvgLineOverlay = ({ seriesList }) => {
  const ref = React.useRef(null);
  const [dim, setDim] = React.useState(null);
  React.useEffect(() => {
    const measure = () => { if (ref.current) { const r = ref.current.getBoundingClientRect(); if (r.width > 0) setDim({ w: r.width, h: r.height }); } };
    measure();
    window.addEventListener("resize", measure);
    return () => window.removeEventListener("resize", measure);
  }, []);
  return <div ref={ref} style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
    {dim && <svg width={dim.w} height={dim.h} style={{ position: "absolute", inset: 0 }}>
      {seriesList.map((s, si) => {
        const px = s.pts.map(p => ({ x: (p.xPct / 100) * dim.w, y: dim.h - (p.yPct / 100) * dim.h }));
        return <React.Fragment key={si}>
          {s.fill && <path d={"M" + px.map(p => p.x+","+p.y).join("L") + "L"+px[px.length-1].x+","+dim.h+"L"+px[0].x+","+dim.h+"Z"} fill={s.color} opacity={0.12} />}
          <polyline points={px.map(p => p.x+","+p.y).join(" ")} fill="none" stroke={s.color} strokeWidth={s.strokeWidth || 2} strokeLinejoin="round" strokeLinecap="round" />
          {s.dots !== false && px.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r={3} fill={s.color} />)}
        </React.Fragment>;
      })}
    </svg>}
  </div>;
};

// Line Chart with pixel-accurate SVG lines
const LineChart = ({ data, children }) => {
  const lines = React.Children.toArray(children).filter(c => c && c.type === Line);
  if (!data || !data.length || !lines.length) return <div style={{height:"100%"}} />;
  const allVals = lines.flatMap(l => data.map(d => d[l.props.dataKey]).filter(v => v != null));
  const min = Math.min(...allVals) * 0.9;
  const max = Math.max(...allVals) * 1.1;
  const range = max - min || 1;
  const yTickCount = 5;
  const yTicks = Array.from({length: yTickCount}, (_, i) => Math.round(min + (range * i / (yTickCount - 1))));
  const toX = (i) => data.length > 1 ? (i / (data.length - 1)) * 100 : 50;
  const toY = (v) => ((v - min) / range) * 100;
  const seriesList = lines.map(line => ({
    color: "#" + (line.props.stroke || "3B82F6").replace("#",""),
    strokeWidth: line.props.strokeWidth || 2,
    pts: data.map((d, i) => ({ xPct: toX(i), yPct: toY(d[line.props.dataKey] || 0) })),
  }));
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      <div style={{ flex: 1, display: "flex", minHeight: 0 }}>
        <div style={{ width: 38, display: "flex", flexDirection: "column-reverse", justifyContent: "space-between", paddingBottom: 2, paddingRight: 4 }}>
          {yTicks.map((v, i) => <span key={i} style={{ fontSize: 8, color: "#94A3B8", textAlign: "right", lineHeight: 1 }}>{v}</span>)}
        </div>
        <div style={{ flex: 1, borderLeft: "1px solid #E2E8F0", borderBottom: "1px solid #E2E8F0", position: "relative", overflow: "hidden" }}>
          {[0.25, 0.5, 0.75].map(f => <div key={f} style={{ position: "absolute", left: 0, right: 0, bottom: (f*100)+"%", borderTop: "1px dashed #F1F5F9" }} />)}
          <SvgLineOverlay seriesList={seriesList} />
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", marginLeft: 38 }}>
        {data.filter((d,i) => i % Math.ceil(data.length / 6) === 0 || i === data.length-1).map((d, i) => (
          <span key={i} style={{ fontSize: 8, color: "#94A3B8" }}>{d[Object.keys(d)[0]]}</span>
        ))}
      </div>
      {lines.length > 1 && <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        {lines.map((l,i) => <span key={i} style={{fontSize:9,color:"#"+((l.props.stroke||"3B82F6").replace("#",""))}}>● {l.props.name||l.props.dataKey}</span>)}
      </div>}
    </div>
  );
};

const Line = ({ dataKey, stroke, strokeWidth, name, dot, strokeDasharray }) => null;

// Area Chart with pixel-accurate SVG lines + filled areas
const AreaChart = ({ data, children }) => {
  const areas = React.Children.toArray(children).filter(c => c && c.type === Area);
  if (!data || !data.length) return <div style={{height:"100%"}} />;
  const allVals = areas.flatMap(a => data.map(d => d[a.props.dataKey]).filter(v => v != null));
  const min = Math.min(...allVals) * 0.85;
  const max = Math.max(...allVals) * 1.1;
  const range = max - min || 1;
  const yTickCount = 5;
  const yTicks = Array.from({length: yTickCount}, (_, i) => Math.round(min + (range * i / (yTickCount - 1))));
  const toX = (i) => data.length > 1 ? (i / (data.length - 1)) * 100 : 50;
  const toY = (v) => ((v - min) / range) * 100;
  const seriesList = areas.map(area => ({
    color: "#" + (area.props.stroke || "3B82F6").replace("#",""),
    strokeWidth: area.props.strokeWidth || 2,
    fill: true, dots: false,
    pts: data.map((d, i) => ({ xPct: toX(i), yPct: toY(d[area.props.dataKey] || 0) })),
  }));
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      <div style={{ flex: 1, display: "flex", minHeight: 0 }}>
        <div style={{ width: 38, display: "flex", flexDirection: "column-reverse", justifyContent: "space-between", paddingBottom: 2, paddingRight: 4 }}>
          {yTicks.map((v, i) => <span key={i} style={{ fontSize: 8, color: "#94A3B8", textAlign: "right", lineHeight: 1 }}>{v}</span>)}
        </div>
        <div style={{ flex: 1, borderLeft: "1px solid #E2E8F0", borderBottom: "1px solid #E2E8F0", position: "relative", overflow: "hidden" }}>
          {[0.25, 0.5, 0.75].map(f => <div key={f} style={{ position: "absolute", left: 0, right: 0, bottom: (f*100)+"%", borderTop: "1px dashed #F1F5F9" }} />)}
          <SvgLineOverlay seriesList={seriesList} />
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", marginLeft: 38 }}>
        {data.filter((d,i) => i % Math.ceil(data.length / 6) === 0 || i === data.length-1).map((d, i) => (
          <span key={i} style={{ fontSize: 8, color: "#94A3B8" }}>{d[Object.keys(d)[0]]}</span>
        ))}
      </div>
      {areas.length > 1 && <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap",marginTop:2}}>
        {areas.map((a,i) => <span key={i} style={{fontSize:9,color:"#"+((a.props.stroke||"3B82F6").replace("#",""))}}>● {a.props.name||a.props.dataKey}</span>)}
      </div>}
    </div>
  );
};

const Area = ({ dataKey, stroke, fill, strokeWidth, name, type }) => null;

// CSS Composed Chart — bars as absolute divs + lines as CSS segments
const ComposedChart = ({ data, children }) => {
  const bars = React.Children.toArray(children).filter(c => c && c.type === Bar);
  const lines = React.Children.toArray(children).filter(c => c && c.type === Line);
  const allBarVals = data.flatMap(d => bars.map(b => Math.abs(d[b.props.dataKey] || 0)));
  const allLineVals = data.flatMap(d => lines.map(l => Math.abs(d[l.props.dataKey] || 0)));
  const allVals = [...allBarVals, ...allLineVals];
  const rawMax = Math.max(...allVals);
  const niceMax = Math.ceil(rawMax / 50) * 50 || rawMax || 100;
  const yTicks = [0, Math.round(niceMax * 0.25), Math.round(niceMax * 0.5), Math.round(niceMax * 0.75), niceMax];
  const n = data.length;
  const groupW = 100 / n;
  const barW = groupW * 0.6 / Math.max(bars.length, 1);
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      <div style={{ flex: 1, display: "flex", minHeight: 0 }}>
        <div style={{ width: 36, display: "flex", flexDirection: "column-reverse", justifyContent: "space-between", paddingBottom: 2, paddingRight: 4 }}>
          {yTicks.map((v, i) => <span key={i} style={{ fontSize: 8, color: "#94A3B8", textAlign: "right", lineHeight: 1 }}>{v}</span>)}
        </div>
        <div style={{ flex: 1, borderLeft: "1px solid #E2E8F0", borderBottom: "1px solid #E2E8F0", position: "relative", overflow: "hidden" }}>
          {[0.25, 0.5, 0.75].map(f => <div key={f} style={{ position: "absolute", left: 0, right: 0, bottom: (f*100)+"%", borderTop: "1px dashed #F1F5F9" }} />)}
          {data.map((d, di) =>
            bars.map((b, bi) => {
              const v = d[b.props.dataKey] || 0;
              const clr = b.props.fill || "#3B82F6";
              const cells = React.Children.toArray(b.props.children||[]).filter(c=>c&&c.type===Cell);
              const col = cells[di] ? cells[di].props.fill : clr;
              const pct = niceMax > 0 ? (Math.abs(v)/niceMax)*100 : 0;
              const left = di*groupW + groupW*0.2 + bi*barW;
              return <div key={di+"-"+bi} style={{ position: "absolute", bottom: 0, left: left+"%", width: barW+"%", height: pct+"%", background: col, opacity: b.props.opacity||0.85, borderRadius: "3px 3px 0 0", transition: "height 0.4s ease" }} />;
            })
          )}
          <SvgLineOverlay seriesList={lines.map(l => ({
            color: l.props.stroke || "#EF4444",
            strokeWidth: l.props.strokeWidth || 2,
            pts: data.map((d, di) => ({
              xPct: di * groupW + groupW * 0.5,
              yPct: niceMax > 0 ? (d[l.props.dataKey] || 0) / niceMax * 100 : 0
            })),
          }))} />
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-around", marginLeft: 36, padding: "4px 0" }}>
        {data.map((d, i) => <span key={i} style={{ fontSize: 7, color: "#94A3B8", whiteSpace: "nowrap" }}>{d[Object.keys(d)[0]]}</span>)}
      </div>
      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        {bars.map((b,i) => <span key={i} style={{fontSize:9,color:b.props.fill||"#3B82F6"}}>{"\u25A0"} {b.props.name||b.props.dataKey}</span>)}
        {lines.map((l,i) => <span key={"ll-"+i} style={{fontSize:9,color:l.props.stroke||"#EF4444"}}>{"\u2014"} {l.props.name||l.props.dataKey}</span>)}
      </div>
    </div>
  );
};

// Pie Chart
const PieChart = ({ children }) => {
  const pie = React.Children.toArray(children).find(c => c && c.type === Pie);
  if (!pie) return null;
  const data = pie.props.data || [];
  const total = data.reduce((s, d) => s + (d[pie.props.dataKey] || 0), 0);
  const cells = React.Children.toArray(pie.props.children || []).filter(c => c && c.type === Cell);
  let cum = 0;
  return (
    <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 16 }}>
      <svg viewBox="-1.2 -1.2 2.4 2.4" style={{ width: 120, height: 120 }}>
        {data.map((d, i) => {
          const val = d[pie.props.dataKey] || 0;
          const pct = val / total;
          const start = cum * Math.PI * 2 - Math.PI/2;
          cum += pct;
          const end = cum * Math.PI * 2 - Math.PI/2;
          const large = pct > 0.5 ? 1 : 0;
          const x1 = Math.cos(start), y1 = Math.sin(start);
          const x2 = Math.cos(end), y2 = Math.sin(end);
          const inner = pie.props.innerRadius ? 0.5 : 0;
          const color = cells[i] ? cells[i].props.fill : (d.color || ["#0F2137","#C87941","#14B8A6","#3B82F6","#22C55E"][i % 5]);
          if (inner > 0) {
            const ix1 = x1*inner, iy1 = y1*inner, ix2 = x2*inner, iy2 = y2*inner;
            return <path key={i} d={"M"+x1+","+y1+" A1,1 0 "+large+",1 "+x2+","+y2+" L"+ix2+","+iy2+" A"+inner+","+inner+" 0 "+large+",0 "+ix1+","+iy1+"Z"} fill={color} />;
          }
          return <path key={i} d={"M0,0 L"+x1+","+y1+" A1,1 0 "+large+",1 "+x2+","+y2+"Z"} fill={color} />;
        })}
      </svg>
      <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
        {data.map((d, i) => {
          const color = cells[i] ? cells[i].props.fill : (d.color || ["#0F2137","#C87941","#14B8A6","#3B82F6","#22C55E"][i % 5]);
          return <div key={i} style={{ fontSize: 9, display: "flex", alignItems: "center", gap: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: color, flexShrink: 0 }} />
            <span style={{ color: "#475569" }}>{d.name || d[Object.keys(d)[0]]} {((d[pie.props.dataKey]/total)*100).toFixed(0)}%</span>
          </div>;
        })}
      </div>
    </div>
  );
};

const Pie = ({ data, dataKey, cx, cy, innerRadius, outerRadius, label, labelLine, children }) => null;

// Radar Chart
const RadarChart = ({ data, children }) => {
  const radars = React.Children.toArray(children).filter(c => c && c.type === Radar);
  if (!data || !data.length) return <div />;
  const n = data.length;
  const cx = 50, cy = 50, r = 38;
  const angleStep = (Math.PI * 2) / n;
  const getPoint = (i, val) => {
    const a = i * angleStep - Math.PI / 2;
    const d = (val / 100) * r;
    return { x: cx + d * Math.cos(a), y: cy + d * Math.sin(a) };
  };
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center" }}>
      <svg viewBox="0 0 100 100" style={{ flex: 1, maxHeight: "85%" }}>
        {[20,40,60,80,100].map(v => (
          <polygon key={v} points={data.map((_,i) => { const p = getPoint(i, v); return p.x+","+p.y; }).join(" ")} fill="none" stroke="#E2E8F0" strokeWidth={0.3} />
        ))}
        {data.map((_, i) => {
          const p = getPoint(i, 100);
          return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#E2E8F0" strokeWidth={0.3} />;
        })}
        {radars.map((radar, ri) => {
          const col = (radar.props.stroke || "EF4444").replace("#","");
          const pts = data.map((d, i) => getPoint(i, d[radar.props.dataKey] || 0));
          return <polygon key={ri} points={pts.map(p=>p.x+","+p.y).join(" ")} fill={"#"+col} fillOpacity={radar.props.fillOpacity || 0.15} stroke={"#"+col} strokeWidth={1} />;
        })}
        {data.map((d, i) => {
          const p = getPoint(i, 112);
          const dimKey = Object.keys(d).find(k => typeof d[k] === "string") || Object.keys(d)[0];
          return <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" style={{ fontSize: 3.5, fill: "#475569" }}>{d[dimKey]}</text>;
        })}
      </svg>
      <div style={{display:"flex",gap:12,justifyContent:"center"}}>
        {radars.map((r,i) => <span key={i} style={{fontSize:10,color:"#"+(r.props.stroke||"333").replace("#","")}}>● {r.props.name||r.props.dataKey}</span>)}
      </div>
    </div>
  );
};

const Radar = ({ name, dataKey, stroke, fill, fillOpacity, strokeWidth }) => null;
const PolarGrid = () => null;
const PolarAngleAxis = () => null;
const PolarRadiusAxis = () => null;

// Scatter Chart with proper X/Y axis labels and ticks
const ScatterChart = ({ children, margin }) => {
  const scatters = React.Children.toArray(children).filter(c => c && c.type === Scatter);
  const allData = scatters.flatMap(s => (s.props.data || []).map(d => ({...d, _color: s.props.fill})));
  if (!allData.length) return <div style={{height:"100%"}} />;
  const xMin = Math.min(...allData.map(d=>d.x)); const xMax = Math.max(...allData.map(d=>d.x));
  const yMin = Math.min(...allData.map(d=>d.y)); const yMax = Math.max(...allData.map(d=>d.y));
  // Add padding to ranges
  const xPad = (xMax - xMin) * 0.1 || 10; const yPad = (yMax - yMin) * 0.1 || 10;
  const xLo = xMin - xPad; const xHi = xMax + xPad;
  const yLo = Math.max(0, yMin - yPad); const yHi = yMax + yPad;
  const xRange = xHi - xLo || 1; const yRange = yHi - yLo || 1;
  // Generate nice tick values
  const xTickCount = 7; const yTickCount = 5;
  const xTicks = Array.from({length: xTickCount}, (_, i) => Math.round(xLo + (xRange * i / (xTickCount - 1))));
  const yTicks = Array.from({length: yTickCount}, (_, i) => Math.round(yLo + (yRange * i / (yTickCount - 1))));
  // Find XAxis/YAxis children for labels
  const xAxisChild = React.Children.toArray(children).find(c => c && c.type === XAxis);
  const yAxisChild = React.Children.toArray(children).find(c => c && c.type === YAxis);
  const xLabel = xAxisChild?.props?.label?.value || xAxisChild?.props?.name || "";
  const yLabel = yAxisChild?.props?.label?.value || yAxisChild?.props?.name || "";
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      <div style={{ flex: 1, display: "flex" }}>
        {/* Y-axis label (rotated) */}
        <div style={{ width: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>
          {yLabel && <span style={{ fontSize: 9, color: "#94A3B8", writingMode: "vertical-rl", transform: "rotate(180deg)", whiteSpace: "nowrap" }}>{yLabel}</span>}
        </div>
        {/* Y-axis ticks */}
        <div style={{ width: 32, display: "flex", flexDirection: "column-reverse", justifyContent: "space-between", paddingBottom: 2, paddingRight: 4 }}>
          {yTicks.map((v, i) => <span key={i} style={{ fontSize: 8, color: "#94A3B8", textAlign: "right", lineHeight: 1 }}>{v}</span>)}
        </div>
        {/* Plot area */}
        <div style={{ flex: 1, position: "relative", borderLeft: "1px solid #E2E8F0", borderBottom: "1px solid #E2E8F0" }}>
          {/* Grid lines */}
          {[0.25, 0.5, 0.75].map(f => <div key={"h"+f} style={{ position: "absolute", left: 0, right: 0, bottom: (f * 100) + "%", borderTop: "1px dashed #F1F5F9" }} />)}
          {[0.25, 0.5, 0.75].map(f => <div key={"v"+f} style={{ position: "absolute", top: 0, bottom: 0, left: (f * 100) + "%", borderLeft: "1px dashed #F1F5F9" }} />)}
          {/* Zero line if range crosses zero */}
          {xLo < 0 && xHi > 0 && <div style={{ position: "absolute", top: 0, bottom: 0, left: ((0 - xLo) / xRange * 100) + "%", borderLeft: "1px solid #CBD5E1" }} />}
          {/* Data points */}
          {allData.map((d, i) => {
            const left = ((d.x - xLo) / xRange) * 100;
            const bottom = ((d.y - yLo) / yRange) * 100;
            const size = Math.max(10, Math.min(24, (d.z || 50) / 4));
            return <div key={i} title={d.name + ": " + d.y + " k\u20AC, " + (d.x>0?"+":"") + d.x + "% growth, ~" + d.z + "% margin"} style={{
              position: "absolute", left: left+"%", bottom: bottom+"%",
              width: size, height: size, borderRadius: "50%",
              background: d._color || "#3B82F6", opacity: 0.75,
              transform: "translate(-50%, 50%)", cursor: "pointer",
              boxShadow: "0 1px 3px rgba(0,0,0,0.15)",
            }} />;
          })}
        </div>
      </div>
      {/* X-axis ticks */}
      <div style={{ display: "flex", justifyContent: "space-between", marginLeft: 48, padding: "4px 0" }}>
        {xTicks.map((v, i) => <span key={i} style={{ fontSize: 8, color: "#94A3B8" }}>{v}</span>)}
      </div>
      {/* X-axis label */}
      {xLabel && <div style={{ textAlign: "center", marginLeft: 48, fontSize: 9, color: "#94A3B8", marginTop: -2 }}>{xLabel}</div>}
      {/* Legend */}
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",fontSize:9,marginTop:4}}>
        {scatters.map((s,i) => <span key={i} style={{color:s.props.fill}}>● {s.props.name}</span>)}
      </div>
    </div>
  );
};

// MAIN APP — NAVIGATION & LAYOUT
// ═══════════════════════════════════════════
function TEADashboard({ lang }) {
  const t = (de, en) => lang === "en" ? en : de;
  const [page, setPage] = useState("cover");
  const contentRef = useRef(null);

  useEffect(() => {
    if (contentRef.current) {
      contentRef.current.scrollTo({ top: 0, behavior: "smooth" });
    }
  }, [page]);

  const renderPage = () => {
    switch (page) {
      case "cover": return <CoverPage lang={lang} onStart={() => setPage("summary")} />;
      case "summary": return <SummaryPage lang={lang} />;
      case "finance": return <FinancePage lang={lang} />;
      case "market": return <MarketPage lang={lang} />;
      case "products": return <ProductsPage lang={lang} />;
      case "strategy": return <StrategyPage lang={lang} />;
      case "people": return <PeoplePage lang={lang} />;
      case "budget": return <BudgetPage lang={lang} />;
      case "digital": return <DigitalPage lang={lang} />;
      case "risk": return <RiskPage lang={lang} />;
      case "roadmap": return <RoadmapPage lang={lang} />;
      case "kpi": return <KPIPage lang={lang} />;
      default: return <SummaryPage lang={lang} />;
    }
  };

  if (page === "cover") {
    return (
      <div style={{ fontFamily: "'DM Sans', 'Segoe UI', sans-serif" }}>
        <CoverPage lang={lang} onStart={() => setPage("summary")} />
      </div>
    );
  }

  // Group pages for sidebar
  let lastGroup = "";

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: "'DM Sans', 'Segoe UI', sans-serif", background: C.bg }}>
      {/* Sidebar */}
      <nav style={{
        width: 210, background: C.navy, color: "#FFF", display: "flex", flexDirection: "column", flexShrink: 0,
        borderRight: `1px solid ${C.navyLight}`,
      }}>
        {/* Logo */}
        <div style={{ padding: "20px 18px 16px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
          <div style={{ fontSize: 18, fontWeight: 800, fontFamily: "'Playfair Display', 'Georgia', serif", letterSpacing: -0.5 }}>
            TEA <span style={{ color: C.copper }}>2026</span>
          </div>
          <div style={{ fontSize: 9, color: "rgba(255,255,255,0.35)", marginTop: 3, letterSpacing: 1, textTransform: "uppercase" }}>{t("Strategieplan","Strategy Plan")}</div>
        </div>

        {/* Navigation */}
        <div style={{ flex: 1, overflowY: "auto", padding: "8px 0" }}>
          {PAGES.filter(p => p.id !== "cover").map((p) => {
            const showGroup = p.group !== lastGroup && p.group !== "start";
            lastGroup = p.group;
            return (
              <div key={p.id}>
                {showGroup && (
                  <div style={{ padding: "12px 18px 4px", fontSize: 9, color: "rgba(255,255,255,0.25)", letterSpacing: 1.5, fontWeight: 700, textTransform: "uppercase" }}>
                    {lang === "en" ? (EN_GRP[p.group] || GROUPS[p.group]) : GROUPS[p.group]}
                  </div>
                )}
                <button onClick={() => setPage(p.id)} style={{
                  display: "flex", alignItems: "center", gap: 9,
                  width: "100%", padding: "9px 18px", border: "none",
                  background: page === p.id ? "rgba(255,255,255,0.08)" : "transparent",
                  color: page === p.id ? C.copper : "rgba(255,255,255,0.55)",
                  cursor: "pointer", fontSize: 12, fontWeight: page === p.id ? 700 : 400,
                  textAlign: "left",
                  borderLeft: page === p.id ? `3px solid ${C.copper}` : "3px solid transparent",
                  transition: "all 0.15s",
                }}>
                  <span style={{ fontSize: 11, opacity: 0.6, width: 16, textAlign: "center" }}>{p.icon}</span>
                  {lang === "en" ? (EN_NAV[p.id] || p.label) : p.label}
                </button>
              </div>
            );
          })}
        </div>

        {/* Footer */}
        <div style={{ padding: "12px 18px", borderTop: "1px solid rgba(255,255,255,0.06)", fontSize: 9, color: "rgba(255,255,255,0.2)" }}>
          TEA GmbH · Hamburg<br />{t("Erstellt 27.02.2026","Created 27.02.2026")}
        </div>
      </nav>

      {/* Content */}
      <main ref={contentRef} style={{ flex: 1, overflow: "auto", padding: "28px 36px" }}>
        {renderPage()}
      </main>
    </div>
  );
}


function RootApp() {
  const [unlocked, setUnlocked] = React.useState(false);
  const [lang, setLang] = React.useState('de');
  if (!unlocked) return <PasswordGate onUnlock={() => setUnlocked(true)} lang={lang} setLang={setLang} />;
  return (
    <div>
      <LangToggle lang={lang} setLang={setLang} />
      <TEADashboard lang={lang} />
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<RootApp />);
